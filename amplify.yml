# Root-level Amplify monorepo spec.
# This file satisfies the Amplify monorepo detection requirement.
# Each subdirectory is deployed as a SEPARATE Amplify app in the Amplify Console:
#   - Backend:  set App root directory = real-app-backend-main
#   - Frontend: set App root directory = real-app-frontend-main
# The per-app amplify.yml in each subdirectory governs the actual build.
applications:
  - appRoot: real-app-frontend-main
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          commands:
            - env | grep -E '^(REACT_APP_API_URL|SEED_API_KEY|REACT_APP_BACKEND_URL|REACT_APP_FIREBASE_API_KEY|REACT_APP_MONETIZATION_MODE|REACT_APP_LISTING_FEE_AMOUNT|REACT_APP_TENANT_PREMIUM_AMOUNT|DISABLE_ESLINT_PLUGIN)=' > .env.production
            - npm run build
      artifacts:
        baseDirectory: build
        files:
          - "**/*"
      cache:
        paths:
          - node_modules/**/*
      redirects:
        - source: </^[^.]+$|\.(?!(css|gif|ico|jpg|js|png|txt|svg|woff|woff2|ttf|map|json|webp)$)([^.]+$)/>
          target: /index.html
          status: "200"
  - appRoot: real-app-backend-main
    frontend:
      phases:
        preBuild:
          commands:
            - nvm install 20 && nvm use 20
            - npm ci
        build:
          commands:
            - env | grep -E '^(MONGO_URI|SEED_API_KEY|JWT_SECRET|JWT_EXPIRES_IN|NODE_ENV|FRONTEND_URL|PAYMENT_PROVIDER|PAYNOW_INTEGRATION_ID|PAYNOW_INTEGRATION_KEY|PAYNOW_RESULT_URL|PAYNOW_RETURN_URL|LISTING_FEE_AMOUNT|TENANT_PREMIUM_AMOUNT|SMTP_HOST|SMTP_PORT|SMTP_USER|SMTP_PASS|SMTP_SECURE|EMAIL_FROM|R2_ACCOUNT_ID|R2_ACCESS_KEY_ID|R2_SECRET_ACCESS_KEY|R2_BUCKET|R2_PUBLIC_BASE_URL|MONETIZATION_MODE)=' > .env
            - rm -rf .amplify-hosting
            - mkdir -p .amplify-hosting/compute/default
            - cp deploy-manifest.json .amplify-hosting/deploy-manifest.json
            - find . -maxdepth 1 -not -name '.' -not -name 'node_modules' -not -name '.amplify-hosting' -not -name '.git' | xargs -I{} cp -r {} .amplify-hosting/compute/default/
            - npm ci --omit=dev --prefix .amplify-hosting/compute/default
      artifacts:
        baseDirectory: .amplify-hosting
        files:
          - "**/*"
      cache:
        paths:
          - node_modules/**/*
          - .amplify-hosting/compute/default/node_modules/**/*
