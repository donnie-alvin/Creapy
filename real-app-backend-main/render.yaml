# ============================================================
# LEGACY FALLBACK — NOT CANONICAL
# This file is retained as a rollback reference only.
# The canonical production deployment is AWS Amplify backend.
# See DEPLOYMENT.md for the authoritative setup guide.
# ============================================================
services:
  - type: web
    name: creapy-backend
    env: node
    rootDir: real-app-backend-main
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
        sync: false
      - key: PORT
        value: "5000"
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        sync: false
      - key: MONETIZATION_MODE
        sync: false
      - key: PAYMENT_PROVIDER
        sync: false
      - key: PAYNOW_INTEGRATION_ID
        sync: false
      - key: PAYNOW_INTEGRATION_KEY
        sync: false
      - key: PAYNOW_RESULT_URL
        sync: false
      - key: PAYNOW_RETURN_URL
        # Set to your Amplify frontend URL, e.g. https://<branch>.<appid>.amplifyapp.com/payment-complete
        sync: false
      - key: LISTING_FEE_AMOUNT
        sync: false
      - key: TENANT_PREMIUM_AMOUNT
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: AWS_REGION
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_REGION
        sync: false
      - key: S3_PUBLIC_BASE_URL
        sync: false
      - key: S3_ACCESS_KEY_ID # optional; omit when using IAM role
        sync: false
      - key: S3_SECRET_ACCESS_KEY # optional; omit when using IAM role
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: SKIP_EMAIL_VERIFICATION
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: FRONTEND_URL
        # Set to your Amplify frontend URL, e.g. https://<branch>.<appid>.amplifyapp.com
        sync: false
